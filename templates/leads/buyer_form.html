{% extends "base.html" %}
{% block title %}Add Buyer{% endblock %}

{% block content %}
<div class="page-header">
  <h2><i class="bi bi-building me-2"></i>Add New Buyer</h2>
</div>

<div class="form-card" style="max-width:600px">
  <form method="POST">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Buyer Name <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Company Name</label>
        <input type="text" name="company_name" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Industry</label>
        <input type="text" name="industry" class="form-control" placeholder="e.g. Manufacturing, NGO">
      </div>
      <div class="col-12">
        <label class="form-label">Contact Details</label>
        <input type="text" name="contact_details" class="form-control" placeholder="Phone / Email">
      </div>
      <div class="col-12">
        <label class="form-label">Address</label>
        <input type="text" name="address" class="form-control">
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary px-4">
        <i class="bi bi-check-lg me-1"></i>Save Buyer
      </button>
      <button type="button" class="btn btn-outline-secondary" onclick="window.close()">Close</button>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Auto-close tab after save if opened as popup
  {% if saved %}
  window.opener && window.opener.location.reload();
  window.close();
  {% endif %}
</script>
{% endblock %}
