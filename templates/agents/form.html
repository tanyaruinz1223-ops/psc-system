{% extends "base.html" %}
{% block title %}{{ 'Edit' if agent else 'New' }} Agent{% endblock %}

{% block content %}
<div class="page-header">
  <div class="d-flex align-items-center gap-3">
    <a href="{{ url_for('agents') }}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h2 class="mb-0">{{ 'Edit Agent' if agent else 'Register New Agent' }}</h2>
  </div>
</div>

<div class="form-card" style="max-width:760px">
  <form method="POST">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Full Name <span class="text-danger">*</span></label>
        <input type="text" name="full_name" class="form-control"
               value="{{ agent.full_name if agent else '' }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">National ID / Passport</label>
        <input type="text" name="national_id" class="form-control"
               value="{{ agent.national_id if agent else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Date of Birth</label>
        <input type="date" name="date_of_birth" class="form-control"
               value="{{ agent.date_of_birth if agent else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Mobile Number</label>
        <input type="text" name="mobile" class="form-control"
               value="{{ agent.mobile if agent else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control"
               value="{{ agent.email if agent else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Occupation</label>
        <input type="text" name="occupation" class="form-control"
               value="{{ agent.occupation if agent else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Residential Address</label>
        <input type="text" name="address" class="form-control"
               value="{{ agent.address if agent else '' }}">
      </div>
      <div class="col-12">
        <label class="form-label">Bank Account / Mobile Money Details</label>
        <input type="text" name="bank_details" class="form-control"
               value="{{ agent.bank_details if agent else '' }}"
               placeholder="e.g. KCB 1234567890 or Mpesa 0712345678">
      </div>
      <div class="col-12">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2">{{ agent.notes if agent else '' }}</textarea>
      </div>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary px-4">
        <i class="bi bi-check-lg me-1"></i>{{ 'Save Changes' if agent else 'Register Agent' }}
      </button>
      <a href="{{ url_for('agents') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
