<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — ProcureLink</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo text-center mb-1">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="ProcureLink" style="height:70px;object-fit:contain;">
    </div>
    <p class="text-center text-muted mb-4" style="font-size:.78rem">Multi-User Administration System</p>

    {% if error %}
    <div class="alert alert-danger py-2 small"><i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}</div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ 'success' if cat == 'success' else 'danger' }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="text-center mt-4">
      <a href="{{ url_for('apply') }}" class="text-decoration-none" style="font-size:.82rem">
        <i class="bi bi-person-plus me-1"></i>Apply to become a ProcureLink Agent
      </a>
    </div>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:.72rem">
      Contact your administrator if you need access.
    </p>
  </div>
</div>
</body>
</html>
