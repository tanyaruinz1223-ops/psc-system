{% extends "portal/base.html" %}
{% block title %}Submit Lead{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex align-items-center gap-3">
    <a href="{{ url_for('portal_leads') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    <h2 class="mb-0">Submit New Lead</h2>
  </div>
</div>
<div class="form-card" style="max-width:760px">
  <form method="POST">
    <h6 class="fw-bold text-primary mb-3"><i class="bi bi-building me-2"></i>Buyer</h6>
    <div class="row g-3 mb-4">
      <div class="col-md-8">
        <label class="form-label">Select Buyer <span class="text-danger">*</span></label>
        <select name="buyer_id" class="form-select" required>
          <option value="">— Select Buyer —</option>
          {% for b in buyers %}
          <option value="{{ b.id }}">{{ b.name }}{% if b.company_name %} ({{ b.company_name }}){% endif %}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <a href="{{ url_for('portal_buyer_new') }}" class="btn btn-outline-primary w-100" target="_blank">
          <i class="bi bi-plus-lg me-1"></i>Add New Buyer
        </a>
      </div>
    </div>
    <h6 class="fw-bold text-primary mb-3"><i class="bi bi-box-seam me-2"></i>Procurement Details</h6>
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Product Description <span class="text-danger">*</span></label>
        <input type="text" name="product_description" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Quantity</label>
        <input type="text" name="quantity" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Specifications</label>
        <input type="text" name="specifications" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Delivery Requirements</label>
        <input type="text" name="delivery_requirements" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Delivery Location</label>
        <input type="text" name="delivery_location" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Budget</label>
        <input type="text" name="budget" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Timeframe</label>
        <input type="text" name="timeframe" class="form-control">
      </div>
      <div class="col-12">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-success px-4"><i class="bi bi-send me-1"></i>Submit Lead</button>
      <a href="{{ url_for('portal_leads') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
