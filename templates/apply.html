<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Application — PSC System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { background: #0f172a; }
    .apply-card { background: white; border-radius: 16px; padding: 40px; max-width: 600px; margin: 40px auto; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
  </style>
</head>
<body>
<div class="container">
  <div class="apply-card">
    <div class="text-center mb-4">
      <div style="font-size:2rem;font-weight:800;color:#3b82f6">PSC</div>
      <h4 class="fw-bold mt-1">Agent Application Form</h4>
      <p class="text-muted small">Fill in your details below. PSC will review and contact you.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ 'success' if cat == 'success' else 'danger' }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Full Name <span class="text-danger">*</span></label>
          <input type="text" name="full_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">National ID / Passport <span class="text-danger">*</span></label>
          <input type="text" name="national_id" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Date of Birth</label>
          <input type="date" name="date_of_birth" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
          <input type="text" name="mobile" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Occupation</label>
          <input type="text" name="occupation" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Residential Address</label>
          <input type="text" name="address" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Bank Account / Mobile Money Details</label>
          <input type="text" name="bank_details" class="form-control" placeholder="e.g. KCB 1234567890 or Mpesa 0712345678">
        </div>
        <div class="col-12">
          <label class="form-label">Additional Notes</label>
          <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-semibold">
        <i class="bi bi-send me-2"></i>Submit Application
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('login') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Back to Login
      </a>
    </div>
  </div>
</div>
</body>
</html>
