services:
  - type: web
    name: psc-admin-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: psc-database
          property: connectionString

databases:
  - name: psc-database
    plan: free
